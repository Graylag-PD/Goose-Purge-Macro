### Bucket stepper macros ###

[gcode_macro _goose_purge_tray_park_pos]
description: parking the tray on a safe spot, with enought force to shake the purges
gcode:
    MANUAL_STEPPER STEPPER=goose_purge_tray MOVE=0 SPEED=2000 sync=1
    MANUAL_STEPPER STEPPER=goose_purge_tray ENABLE=0

[gcode_macro _goose_purge_tray_purge_pos]
description: maove the tray under the belt
gcode:
    MANUAL_STEPPER STEPPER=goose_purge_tray MOVE=70 SPEED=400 sync=1								# the move position should be a variable
    MANUAL_STEPPER STEPPER=goose_purge_tray ENABLE=0

[delayed_gcode _goose_purge_tray_home]
description: home the tray and park it in a safe spot
initial_duration: 1																					# if in use should be disabled for the first move, to check the right direktion of the stepper.
gcode:
        MANUAL_STEPPER STEPPER=goose_purge_tray MOVE=-100 SPEED=100 sync=1 STOP_ON_ENDSTOP=1
        MANUAL_STEPPER STEPPER=goose_purge_tray SET_POSITION=0
        MANUAL_STEPPER STEPPER=goose_purge_tray ENABLE=0


