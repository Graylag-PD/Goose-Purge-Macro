#################################################
#      Goose Belt Purger configuration file     #
#              Hardware definitions             #
#################################################
This file is for hardware configuration


### Belt DC motor pin definition ###
	# If your motor does not run, you can replace 'output_pin' for 'fan_generic', keeping the rest of the configuration. The macro will run either way. 
[output_pin goose_purge_belt]
# Define 'pin:' to your board. Do not change remaining lines 
pin: PD15
pwm: True
hardware_pwm: True
cycle_time: 0.00004   # 25kHz PWM

### Servo retractable mount servo ###
[servo goose_purge_servomount]
pin:
#maximum_servo_angle: 90
#minimum_pulse_width: 0.001
#maximum_pulse_width: 0.002
#initial_angle: 0

